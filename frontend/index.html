<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse Logistics — HyperLocal Re-Fulfillment Demo</title>
  <meta name="description"
    content="Smart HyperLocal Re-Fulfillment System — Reduce delivery time and logistics cost by locally redispatching returned clothing products.">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Preloader -->
  <div id="preloader">
    <div class="loader"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var p = document.getElementById('preloader');
        if (p) {
          p.style.opacity = '0';
          setTimeout(function () { p.style.display = 'none'; }, 1000);
        }
      }, 800);
    });
  </script>
</body>

</html>
